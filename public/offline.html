<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BookEasy — You're offline</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#05050f;color:#fff;font-family:'Figtree',system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px}
    .card{background:rgba(13,13,31,0.8);border:1px solid rgba(26,26,58,0.9);border-radius:24px;padding:48px 40px;max-width:400px;width:100%}
    .icon{width:64px;height:64px;background:rgba(37,99,255,0.12);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 24px}
    h1{font-size:1.5rem;font-weight:700;margin-bottom:12px}
    p{color:rgba(255,255,255,0.5);font-size:0.95rem;line-height:1.6;margin-bottom:28px}
    button{background:linear-gradient(135deg,#2563ff,#00d4ff);color:#fff;border:none;padding:12px 28px;border-radius:12px;font-size:0.95rem;font-weight:600;cursor:pointer}
    button:hover{opacity:0.9}
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#2563ff" stroke-width="1.8">
        <line x1="1" y1="1" x2="23" y2="23"/><path d="M16.72 11.06A10.94 10.94 0 0119 12.55"/><path d="M5 12.55a10.94 10.94 0 015.17-2.39"/><path d="M10.71 5.05A16 16 0 0122.56 9"/><path d="M1.42 9a15.91 15.91 0 014.7-2.88"/><path d="M8.53 16.11a6 6 0 016.95 0"/><line x1="12" y1="20" x2="12.01" y2="20" stroke-width="2.5"/>
      </svg>
    </div>
    <h1>You're offline</h1>
    <p>It looks like you've lost your internet connection. Check your network and try again.</p>
    <button onclick="window.location.reload()">Try again</button>
  </div>
</body>
</html>
